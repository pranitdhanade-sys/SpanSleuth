version: '3.9'
services:
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pulseguard
      POSTGRES_PASSWORD: pulseguard
      POSTGRES_DB: pulseguard
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  chromadb:
    image: chromadb/chroma:latest
    ports: ["8001:8000"]
